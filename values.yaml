# Default values for karma chart
replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/prymitive/karma
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

automountServiceAccountToken: false

podAnnotations: {}

podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

containerPort: 8080

command:
  - /karma

args:
  - --config.file
  - /etc/config/karma.yml

service:
  type: ClusterIP
  port: 80
  targetPort: http
  annotations: {}

config: |
  alertmanager:
    servers: []

resources:
  limits:
    memory: 256Mi
    cpu: 500m
  requests:
    memory: 256Mi
    cpu: 100m

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

ingress:
  enabled: false
  ingressClassName: ""
  annotations: {}
  hosts:
    - host: karma.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: tls-secret
      hosts:
        - karma.example.com

nodeSelector: {}

tolerations: []

affinity: {}

revisionHistoryLimit: 10

strategy: {}
