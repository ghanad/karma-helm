name: Helm Chart

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.3

      - name: Run helm lint
        run: helm lint .

      - name: Render default templates
        run: helm template karma .

      - name: Render templates with ingress enabled
        run: >
          helm template karma .
          --set ingress.enabled=true
          --set ingress.ingressClassName=nginx

      - name: Package Helm chart
        run: |
          mkdir -p packages
          helm package . --destination packages

      - name: Upload Helm chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: karma-helm-chart
          path: packages/*.tgz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.3

      - name: Check tag matches chart version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          chart_version="$(helm show chart . | awk -F': *' '/^version:/ { print $2; exit }')"

          if [ "$chart_version" != "$tag_version" ]; then
            echo "Chart version ($chart_version) does not match tag version ($tag_version)."
            exit 1
          fi

      - name: Package Helm chart
        run: |
          mkdir -p packages
          helm package . --destination packages

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists."
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "Helm chart release $GITHUB_REF_NAME"
          fi

      - name: Upload Helm chart to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" packages/*.tgz --clobber
